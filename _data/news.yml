- date: May, 2026
  headline: "Three new preprints from the lab! One led by Shengxin introducing a novel framework to benchmark the individual-level clinical readiness of PRS for coronary artery disease (<a href='https://www.medrxiv.org/content/10.64898/2026.04.16.26350801v1'>Liang, Kim et al., medRxiv</a>), one led by Linke developing a ML approach for cross-platform proteomic imputation to address SomaScan–Olink discordance that has hindered replication of protein–disease associations (<a href='https://www.biorxiv.org/content/10.64898/2026.05.05.723059v1'>Li, Alaa et al., bioRxiv</a>), and one co-led by Zhi reporting the largest CHIP GWAS and PheWAS to date (N>1 million) (<a href='https://www.medrxiv.org/content/10.1101/2022.07.29.22278015v2'>Uddin, Yu et al., medRxiv</a>)."

- date: May, 2026
  headline: "Our paper co-led by Linke establishing link between CHIP and inflammatory bowel disease — and that the oral drug APX3330 can modify it — is now published in <i>Blood</i> (<a href='https://ashpublications.org/blood/article/147/20/2315/566854'>Kumar, Li et al.</a>), with an accompanying podcast and <a href='https://ashpublications.org/blood/article/147/20/2280/568200'>review article</a>."

